name: Deploy to GitHub Pages & Publish Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the release
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build   # next.config.ts has output: 'export' → writes to ./out
        env:
          NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ID }}

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Zip static site for release
        run: |
          cd out
          zip -r ../zen-enterprises-site.zip .
          cd ..

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zen-enterprises-site
          path: zen-enterprises-site.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: zen-enterprises-site

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Site build #${{ github.run_number }}"
          body: |
            Automated static build of the Zen Enterprises website.
            Unzip and open `index.html` in a browser, or run `npx serve .`
            inside the unzipped folder to view it locally — no install or
            build step needed.
          files: zen-enterprises-site.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
